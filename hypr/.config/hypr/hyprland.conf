
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:

source = ~/.config/hypr/mocha.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = foot
$fileManager = nautilus
$menu = rofi -drun
$browser = thorium-browser

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

#exec-once = hyprctl dispatch exec "[workspace 3 silent] $terminal"
#exec-once = hyprctl dispatch exec "[workspace 2 silent] $browser"

exec-once = waybar & hyprpaper & hypridle & mako & hyprlock & alertify
exec-once = hyprctl setcursor catppuccin-mocha-dark-cursors 28
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

exec-once = /home/mimisriz/.config/hypr/scripts/blue-light.py
exec-once = /home/mimisriz/.config/hypr/scripts/weather.py
exec-once = /home/mimisriz/.config/hypr/scripts/hyprlock-weather.sh

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,28
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

###################
### PERMISSIONS ###
###################

# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 1
    gaps_out = 2
    gaps_workspaces = true
    border_size = 0
    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $mauve $flamingo 90deg
    col.inactive_border = rgba(00000000)
    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true
    extend_border_grab_area = 20
    hover_icon_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle

    snap{
        enabled = true
        window_gap = 10
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
# https://wiki.hyprland.org/Configuring/Variables/#animations

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    rounding = 5
    rounding_power = 10

    active_opacity = 0.95
    inactive_opacity = 0.85
    
    blur {
        enabled = true
        size = 4
        passes = 2
        ignore_opacity = false
        new_optimizations = true
        special=true
        vibrancy = 0
        vibrancy_darkness = 0
        noise = 0.015
    }

    shadow {
        enabled = true
        range = 3
        render_power = 3
        color = rgba(cba6f733)
    }
      dim_inactive = true
      dim_strength = 0.1
      dim_special = 0.15
}



animations {
    enabled = yes, please :)
    workspace_wraparound = true

# --------------------
# Organic Watery Bezier Curves (Smooth & Natural)
# --------------------
bezier = waterFlow, 0.25, 0.46, 0.45, 0.94      # Natural water flow
bezier = organicEase, 0.33, 0.0, 0.67, 1.0      # Smooth organic easing
bezier = liquidGlide, 0.215, 0.61, 0.355, 1.0   # Smooth liquid gliding
bezier = fluidMotion, 0.23, 0.82, 0.32, 0.99    # Gentle fluid acceleration
bezier = smoothWave, 0.4, 0.0, 0.2, 1.0         # Wave-like smooth motion
bezier = naturalFlow, 0.25, 0.1, 0.25, 1.0      # Natural flowing motion
bezier = gentleEase, 0.645, 0.045, 0.355, 1.0   # Gentle natural easing
bezier = waterCurve, 0.165, 0.84, 0.44, 1.0     # Water-like curve motion
bezier = fluidEase, 0.25, 0.0, 0.75, 1.0        # Balanced fluid easing
bezier = liquidFlow, 0.42, 0.0, 0.58, 1.0       # Smooth liquid flow

# --------------------
# Global Base (Organic Fluid Foundation)
# --------------------
animation = global, 1, 2.8, waterFlow           # Natural water-like base
animation = border, 1, 2.2, organicEase         # Organic border transitions

# --------------------
# Window Animations (Watery & Natural)
# --------------------
animation = windows, 1, 3.2, liquidGlide        # Smooth liquid window motion
animation = windowsIn, 1, 2.8, fluidMotion, popin   # Gentle fluid entrance
animation = windowsOut, 1, 2.4, waterCurve, popin   # Natural water-like exit

# --------------------
# Fade Animations (Organic Smooth Transitions)
# --------------------
animation = fadeIn, 1, 2.4, naturalFlow         # Natural flowing fade in
animation = fadeOut, 1, 2.0, gentleEase         # Gentle organic fade out
animation = fade, 1, 2.6, fluidEase             # Balanced fluid fading

# --------------------
# Layer Transitions (Smooth Watery Flow)
# --------------------
animation = layers, 1, 2.8, liquidFlow          # Smooth liquid layer changes
animation = layersIn, 1, 2.4, waterFlow, fade   # Natural water-like entrance
animation = layersOut, 1, 2.0, smoothWave, fade # Wave-like smooth exit

# --------------------
# Layer Fade-only (Consistent Organic Flow)
# --------------------
animation = fadeLayersIn, 1, 2.0, organicEase   # Organic fade in
animation = fadeLayersOut, 1, 2.0, organicEase  # Organic fade out

# --------------------
# Workspaces (Natural Fluid Switching)
# -------------------
animation = workspaces, 1, 2.4, liquidGlide, fade    # Smooth liquid workspace flow

# --------------------
# Specialized Organic Interactions
# --------------------
animation = specialWorkspace, 1, 2.2, waterCurve, fade   # Natural water-like special workspaces
animation = borderangle, 1, 1.8, fluidMotion, once       # Gentle fluid border angles

# --------------------
# Optional: Additional Organic Animations
# --------------------
# Uncomment these for extra smoothness if supported:
animation = windowsMove, 1, 2.6, liquidFlow
}

dwindle {

    pseudotile = yes 
    preserve_split = yes # you probably want this
}

master {
    new_status = slave
    mfact = 0.55                 # Master area size (0.5–0.6 is optimal)
    smart_resizing = true        # Allows proportional resizing
}

misc {
    force_default_wallpaper = 0  # Disable anime mascot wallpaper for faster startup
    disable_hyprland_logo = true # Skip splash logo for clean look and quick launch
    animate_manual_resizes = false # Disable animations for faster feel
    animate_mouse_windowdragging = false # Also improves responsiveness
    disable_autoreload = false   # Keep auto-reloading configs on-the-fly
    mouse_move_enables_dpms = true # Wake screen with mouse
    font_family = "Open Sans"
    new_window_takes_over_fullscreen = 2
    enable_anr_dialog = false
    vfr = true
    vrr = true
}

xwayland{
    force_zero_scaling = true
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_rules =


    follow_mouse = 1

    sensitivity = 0.3  # Snappier pointer response; try 0.3–0.5 range

    accel_profile = adaptive  # Better for laptops; try "flat" if you want linear motion

    natural_scroll = false  # Good for laptop trackpads

    touchpad {
        natural_scroll = false
        disable_while_typing = true
        tap-to-click = true
        drag_lock = true
        middle_button_emulation = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 200     # Adjust if too sensitive or not responsive
    workspace_swipe_invert = true      # Set true if direction feels unnatural
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -1
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$shiftMod = SUPER + SHIFT
$altMod = SUPER + ALT # Sets "Alt" key as secondary modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, B, exec, $browser 
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating
bind = $shiftMod, F, fullscreen
bind = $mainMod, R, exec, ~/.config/hypr/scripts/rofi-toggle.sh drun
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, swapsplit, # dwindle
bind = $mainMod, N, swapnext, # dwindle
bind = $mainMod, Y, togglesplit, #dwindle
bind = , F7, exec, ~/.config/hypr/scripts/keyboard-backlight.sh
bind = $mainMod, L, exec, hyprlock
bind = ALT, TAB, cyclenext,
bind = ALT SHIFT, TAB, cyclenext, prev
bind = SUPER, TAB, workspace, m+1
bind = SUPER SHIFT, TAB, workspace, m-1
bind = , F9, exec, ~/.config/hypr/scripts/bluetooth-toggle.py
bind = $shiftMod, X, exec, ~/.config/hypr/scripts/kill-others.py
bind = $altMod, PRINT, exec, hyprshot -m window,
bind = $shiftMod, PRINT, exec, hyprshot -m region
bind = SUPER, PRINT, exec, hyprshot -m output
bind = SUPER, V, exec, ~/.config/hypr/scripts/rofi-toggle.sh clipboard
bind = SUPER, D, exec, ~/.config/hypr/scripts/rofigpt.py
bind = SUPER, PERIOD, exec, smile

binde = $mainMod, left, resizeactive, -20 0
binde = $mainMod, right, resizeactive, 20 0
binde = $mainMod, up, resizeactive, 0 -20
binde = $mainMod, down, resizeactive, 0 20

bind = $shiftMod, C, exec, hyprpicker -a
bind = , F6, exec, ~/.config/hypr/scripts/blue-light.py toggle
bind = SUPER, F6, exec, ~/.config/hypr/scripts/blue-light.py manual
bind = SUPER, PERIOD, exec, smile

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = $altMod, mouse:272, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,F3, exec, ~/.config/hypr/scripts/volume-slider.py up
bindel = ,F2, exec, ~/.config/hypr/scripts/volume-slider.py down
bindel = ,F1, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = ,F5, exec, ~/.config/hypr/scripts/brightness-slider.py +
bindel = ,F4, exec, ~/.config/hypr/scripts/brightness-slider.py -

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
#windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

#layer and window for waybar
layerrule = blur, waybar
layerrule = ignorezero, waybar

# Blur and transparency for mako notifications
windowrulev2 = nofocus, class:^(mako)$
windowrulev2 = float, class:^(mako)$
layerrule = blur, mako
layerrule = ignorezero,mako

#window and layer rule for rofi
windowrulev2 = opacity 0.9 0.9 ,class:^(Rofi)$
windowrulev2 = center, class:^(Rofi)$
layerrule = ignorezero, Rofi
windowrulev2 = stayfocused, class:^(Rofi)$
windowrulev2 = pin, class:^(Rofi)$


windowrulev2 = float, class:^(qalculate-gtk)$
windowrulev2 = center, class:^(qalculate-gtk)$
windowrulev2 = float, class:^(it.mijorus.smile)$

windowrulev2 = noblur, class:^(RStudio)?$, title:^$, xwayland:1
windowrulev2 = noblur, class:^(rstudio)$, floating:1
windowrulev2 = float, class:^(org.gnome.NautilusPreviewer)$
windowrulev2 = rounding 12, class:^(soffice)$


